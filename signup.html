<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link rel="stylesheet" href="Styles/signup.css">
</head>
<body>
    <div class="signupWindow">
        <div class="option">
            <button class="signupB" id="signupB">Sign - Up</button>
            <button class="loginB" id="loginB">Log -In</button>
        </div>
        <div class="detailbox" id="signup">
            <label for="name">Name</label>
            <input type="text" id="name">
            <label for="email">Email</label>
            <input type="email" id="email">
            <label for="password">Password</label>
            <input type="password" name="" id="password">
            <label for="confirmpassword">Confirm Password</label>
            <input type="password" name="" id="confirmpassword">
            <p id="error"></p>
            <button id="submit">Submit</button>

        </div>
        <div class="detailbox" id="login">
            <label for="email">Email</label>
            <input type="email">
            <label for="password">Password</label>
            <input type="password" name="" id="password">
            <button>Log In</button> 
        </div>
    </div>
    <div class="slideShow">
        <img src="Images/AM.jpg" alt="Slide 1" class="slide">
        <img src="Images/DVNL.jpg" alt="Slide 2" class="slide">
        <img src="Images/MB.jpg" alt="Slide 3" class="slide">
        <img src="Images/HM.jpg" alt="Slide 4" class="slide">
        <img src="Images/JM.jpg" alt="Slide 5" class="slide">
        <img src="Images/SA.jpg" alt="Slide 6" class="slide">
    </div>


    <script src="Javascript/signup.js"></script>
</body>
</html>
