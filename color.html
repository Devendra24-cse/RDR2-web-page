<head>

    <title>color</title>
    <style>
        body{
            display: flex;
        }
        div {
            width: 200px;
            height: 200px;
        }
        #red {
            background-color: #C1121F;
        }
        #darkred {
            background-color: #7A0C14;

        }
        #brown {
            background-color: #6B3E26;
        }
        #black {
            background-color: #0F0F0F;
        }
        #white {
            background-color: #E6C7A9;
        }
        #orange {
            background-color: #A3471D;
        }
        #gold {
            background-color: #C89B3C;
        }
    </style>
</head>
<body>
    <div id="red">
        
    </div>
    <div id="darkred">

    </div>
    <div id="brown">

    </div>
    <div id="black">

    </div>
    <div id="white">

    </div>
    <div id="orange">

    </div>
    <div id="gold">

    </div>
    
</body>
</html>
